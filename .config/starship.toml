"$schema" = 'https://starship.rs/config-schema.json'

format = "$directory$git_branch$git_status$line_break$character"
right_format = "$kubernetes$time"

[directory]
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = "on "
format = "$symbol[$branch](bold yellow) "

[git_status]
format = "[$all_status$ahead_behind]($style)"

[kubernetes]
disabled = false
format = "[$context](bold blue)[ \\($namespace\\)](yellow) "
detect_files = []
detect_extensions = []
detect_folders = []


[time]
disabled = false
time_format = "%T"

[character]
success_symbol = "[%](bold green)"
error_symbol = "[%](bold red)"

[azure]
symbol = "☁️ "

[battery]
full_symbol = "• "
charging_symbol = "⇡ "
discharging_symbol = "⇣ "
unknown_symbol = "❓ "
empty_symbol = "❗ "

[erlang]
symbol = "ⓔ "

[nodejs]
symbol = "[⬢](bold green) "

[pulumi]
symbol = "🧊 "
